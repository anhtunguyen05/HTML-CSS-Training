<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- reset css -->
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- styles -->
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <title>Du an 2 - figma to html</title>
  </head>
  <body style="height: 10000px">
    <header class="header fixed">
      <div class="main-content">
        <div class="body">
          <!-- logo -->
          <a href="#!"><img src="./assets/img/Union.svg" alt="" /></a>
          <!-- nav -->
          <nav class="nav">
            <ul>
              <li>
                <a href="#!">Home</a>
              </li>
              <li>
                <a href="#!">Features</a>
              </li>
              <li>
                <a href="#!">Pricing</a>
              </li>
              <li>
                <a href="#!">About</a>
              </li>
              <li>
                <a href="#!">Contact</a>
              </li>
            </ul>
          </nav>
          <!-- btn action -->
          <div class="action">
            <a href="#!" class="action-link">Sign in</a>
            <a href="#!" class="action-btn">Sign up</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="hero">
        <div class="main-content">
          <div class="body">
            <!-- hero left -->
            <div class="content-block">
              <p class="top-tiltle">😎 EASY LEAENING PLATFORM</p>
              <h1 class="title">Words learner come here.</h1>
              <p class="desc">
                Build skills with courses, certificates, and get online
                knowledge from our
              </p>
              <span class="desc-span">world-class platform</span>.
              <div class="cta-group">
                <a href="#!" class="btn">Get Started</a>
                <div class="play-video">
                  <img src="./assets/img/Vector 90.svg" alt="" />
                </div>
              </div>
            </div>
            <!-- hero right -->
            <div class="media-block">
              <img
                src="./assets/img/pexels-andrea-piacquadio-3808822-removebg 2.svg"
                alt=""
                class="media"
              />
              <!-- courses -->
              <div class="media-courses">
                <img src="./assets/img/Book.svg" alt="" class="course-icon" />
                <span class="detail">Courses 1000+</span>
              </div>
              <!-- schedules -->
              <div class="media-schedules">
                <span class="detail">Schedules</span>
                <img
                  src="./assets/img/Group 5531.svg"
                  alt=""
                  class="schedule-icon icon-1"
                />
                <img
                  src="./assets/img/Group 5532.svg"
                  alt=""
                  class="schedule-icon icon-2"
                />
                <img
                  src="./assets/img/Group 5533.svg"
                  alt=""
                  class="schedule-icon icon-3"
                />
                <img
                  src="./assets/img/Rectangle 3824.svg"
                  alt=""
                  class="schedule-icon icon-4"
                />
              </div>
              <!-- avatar block -->
              <div class="avatar-block">
                <span class="detail">Our Active Students</span>
                <div class="ava-list">
                  <img src="./assets/img/Ellipse 1866.svg" alt="" class="ava" />
                  <img
                    src="./assets/img/Ellipse 1866 (1).svg"
                    alt=""
                    class="ava ava-1"
                  />
                  <img
                    src="./assets/img/Ellipse 1866 (2).svg"
                    alt=""
                    class="ava ava-2"
                  />
                  <img
                    src="./assets/img/Ellipse 1866 (3).svg"
                    alt=""
                    class="ava ava-3"
                  />
                  <div class="ava ava-more">
                    <span>10K+</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
